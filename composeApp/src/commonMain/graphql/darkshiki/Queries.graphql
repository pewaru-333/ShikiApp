# ============================================= Anime =============================================

query AnimeExtra($id: String!) {
    animes(ids: $id) {
        characterRoles {
            ...CharacterRole
        }
        chronology {
            ...AnimeContent
            airedOn {
                date
            }
            rating
            releasedOn {
                date
            }
        }
        personRoles {
            ...PersonRole
        }
        related {
            ...RelatedFragment
        }
        scoresStats {
            ...Scores
        }
        statusesStats {
            ...Stats
        }
    }
}

# ============================================= Manga =============================================

query MangaExtra($id: String!) {
    mangas(ids: $id) {
        characterRoles {
            ...CharacterRole
        }
        chronology {
            ...MangaContent
            airedOn {
                date
            }
            releasedOn {
                date
            }
        }
        personRoles {
            ...PersonRole
        }
        related {
            ...RelatedFragment
        }
        scoresStats {
            ...Scores
        }
        statusesStats {
            ...Stats
        }
    }
}

# =========================================== Character ===========================================

query Character($ids: [ID!]) {
    characters(ids: $ids) {
        poster {
            originalUrl
        }
        topic {
            id
        }
    }
}

