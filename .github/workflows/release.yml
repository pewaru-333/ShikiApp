permissions:
  contents: read
name: 'Release'

on:
  workflow_dispatch:

jobs:
  get-version:
    runs-on: ubuntu-latest

    outputs:
      version_code: ${{ steps.extract_version.outputs.version_code }}
      version_name: ${{ steps.extract_version.outputs.version_name }}

    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v6

      - name: 'Extract versions from androidApp/build.gradle.kts'
        id: extract_version
        run: |
          VERSION_CODE=$(grep "versionCode" androidApp/build.gradle.kts | sed 's/[^0-9]*//g')
          VERSION_NAME=$(grep "versionName" androidApp/build.gradle.kts | cut -d '"' -f 2)

          echo "Извлечено: versionCode=${VERSION_CODE}, versionName=${VERSION_NAME}"

          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT

  prepare-changelog:
    runs-on: ubuntu-latest
    needs: get-version

    outputs:
      release_body: ${{ steps.generate_changelog.outputs.body }}

    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 'Setup Python'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 'Generate changelog'
        id: generate_changelog
        run: |
          echo 'body<<EOF' >> $GITHUB_OUTPUT
          
          python .github/scripts/generate_changelog.py \
            ${{ needs.get-version.outputs.version_code }} \
            ${{ needs.get-version.outputs.version_name }} \
            ${{ github.repository }} >> $GITHUB_OUTPUT
          
          echo 'EOF' >> $GITHUB_OUTPUT

  build-android:
    runs-on: ubuntu-latest
    needs: get-version

    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v6

      - name: 'Setup JDK 21'
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 'Setup Gradle'
        uses: gradle/actions/setup-gradle@v6

      - name: 'Grant execution permission to Gradle Wrapper'
        run: chmod +x gradlew

      - name: 'Build all flavors'
        run: ./gradlew :androidApp:assembleRelease

      # ================= ShikiApp =================
      - name: 'Sign ShikiApp'
        id: sign_shikiapp
        uses: ilharp/sign-android-release@v2
        with:
          releaseDir: androidApp/build/outputs/apk/ShikiApp/release
          signingKey: ${{ secrets.ANDROID_SIGNING_KEY }}
          keyAlias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: 'Rename signed ShikiApp .apk'
        run: |
          SIGNED_APK_FILE=$(find ${{ steps.sign_shikiapp.outputs.signedFile }} -name '*.apk' | head -n 1)
          mv "$SIGNED_APK_FILE" "ShikiApp.apk"

      - name: 'Upload ShikiApp APK as artifact'
        uses: actions/upload-artifact@v7
        with:
          name: ShikiApp-apk
          path: ShikiApp.apk

      # ================= ShikiRip =================
      - name: 'Sign ShikiRip'
        id: sign_dark
        uses: ilharp/sign-android-release@v2
        with:
          releaseDir: androidApp/build/outputs/apk/DarkShiki/release
          signingKey: ${{ secrets.ANDROID_SIGNING_KEY }}
          keyAlias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: 'Rename signed ShikiRip .apk'
        run: |
          SIGNED_APK_FILE=$(find ${{ steps.sign_dark.outputs.signedFile }} -name '*.apk' | head -n 1)
          mv "$SIGNED_APK_FILE" "ShikiRip.apk"

      - name: 'Upload ShikiRip APK as artifact'
        uses: actions/upload-artifact@v7
        with:
          name: ShikiRip-apk
          path: ShikiRip.apk

  build-windows:
    runs-on: windows-latest
    needs: get-version

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'zulu'

      - uses: gradle/actions/setup-gradle@v6

      - name: 'Build Windows Portable Zip'
        run: ./gradlew :desktopApp:packageZipDistributable

      - name: 'Upload Windows Zip as artifact'
        uses: actions/upload-artifact@v7
        with:
          name: windows-zip
          path: desktopApp/build/distributions/*-windows-portable.zip

  build-linux:
    runs-on: ubuntu-latest
    needs: get-version
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'zulu'

      - uses: gradle/actions/setup-gradle@v6
      - run: chmod +x gradlew

      - name: 'Build Linux files'
        run: ./gradlew :desktopApp:createReleaseDistributable

      - name: 'Package Portable Linux Build'
        run: |
          cd desktopApp/build/compose/binaries/main-release/app
          tar -czvf ShikiApp-linux-portable.tar.gz ShikiApp/

      - name: 'Upload Linux Portable as artifact'
        uses: actions/upload-artifact@v7
        with:
          name: linux-portable
          path: desktopApp/build/compose/binaries/main-release/app/ShikiApp-linux-portable.tar.gz

  create-release:
    runs-on: ubuntu-latest
    needs: [ get-version, prepare-changelog, build-android, build-windows, build-linux ]
    permissions:
      contents: write

    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 'Download ShikiApp APK'
        uses: actions/download-artifact@v8
        with:
          name: ShikiApp-apk

      - name: 'Download ShikiRip APK'
        uses: actions/download-artifact@v8
        with:
          name: ShikiRip-apk

      - name: 'Download Windows Zip'
        uses: actions/download-artifact@v8
        with:
          name: windows-zip

      - name: 'Download Linux Tar'
        uses: actions/download-artifact@v8
        with:
          name: linux-portable

      - name: 'Push Tag'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ needs.get-version.outputs.version_name }}
          git push origin ${{ needs.get-version.outputs.version_name }}

      - name: 'Create GitHub release'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.get-version.outputs.version_name }}
          body: ${{ needs.prepare-changelog.outputs.release_body }}
          files: |
            ShikiApp.apk
            ShikiRip.apk
            *-portable.zip
            *-portable.tar.gz

  deploy-rustore:
    runs-on: ubuntu-latest
    needs: [ get-version, build-android ]

    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v6

      - name: 'Download ShikiApp APK'
        uses: actions/download-artifact@v8
        with:
          name: ShikiApp-apk

      - name: 'Read changelog'
        id: read_changelog
        run: |
          VERSION_CODE=${{ needs.get-version.outputs.version_code }}
          CHANGELOG_PATH="fastlane/metadata/android/ru/changelogs/${VERSION_CODE}.txt"
          
          EOF=$(openssl rand -hex 8)
          
          echo "WHATS_NEW<<$EOF" >> $GITHUB_ENV
          if [ -f "$CHANGELOG_PATH" ]; then
            cat "$CHANGELOG_PATH" >> $GITHUB_ENV
            echo "" >> $GITHUB_ENV
          else
            echo "— Это техническое обновление без изменений в интерфейсе." >> $GITHUB_ENV
          fi
          echo "$EOF" >> $GITHUB_ENV

      - name: 'RuStore Publish'
        id: rustore_publish
        uses: Suro4ek/rustore-action@v0.0.1
        with:
          key_id: ${{ secrets.RUSTORE_KEY_ID }}
          private_key: ${{ secrets.RUSTORE_PRIVATE_KEY }}
          publish_type: 'INSTANTLY'
          application_id: 'org.application.shikiapp'
          file: 'ShikiApp.apk'
          whats_new: ${{ env.WHATS_NEW }}

      - name: 'Print RuStore Result'
        run: |
          echo "RuStore version ID: ${{ steps.rustore_publish.outputs.version_id }}"
          echo "RuStore статус: ${{ steps.rustore_publish.outputs.status }}"